model:
  type: route_gumbel
  keep_k: 32
  split_block: 4
  qk_dim: 128
  mode: tokens
  reduce: logsumexp
  tau_start: 2.0
  tau_end: 0.5
  tau_decay: 0.9995
  gumbel_off_step: 20000
  lambda_div: 0.01
  div_type: usage_entropy   # or batch_cosine
gating:
  target_keep_ratio: 0.6
  lambda_budget: 1.0
  lambda_entropy: 0.01
  gate_mlp: true
  gate_hidden: 128
  gate_mlp_updates: true

gumbel:
  tau_start: 1.0
  tau_end: 0.2
  tau_anneal_steps: 20000
  hard_gates_train: false
  inference_topk: null

train:
  out_dir: ./outputs/imagenette_route_deit
  epochs: 50
  lr: 0.0003
  weight_decay: 0.05
  grad_clip: 1.0
  log_every: 50
  seed: 42

wandb:
  enabled: true
  project: masked-vit
  entity: "poonamps1791"
  name: null
  tags: ["imagenette"]